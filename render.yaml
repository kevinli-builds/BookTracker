services:
  - type: web
    name: booktracker-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --ignore-scripts && npm run build && npx prisma generate
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SETUP_KEY
        sync: false
      - key: GOOGLE_BOOKS_API_KEY
        sync: false
